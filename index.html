<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ema. | Boundary Spanner</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンのコンポーネント ---
    const Instagram = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>
      </svg>
    );

    const Menu = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="4" x2="20" y1="12" y2="12"></line>
        <line x1="4" x2="20" y1="6" y2="6"></line>
        <line x1="4" x2="20" y1="18" y2="18"></line>
      </svg>
    );

    const X = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M18 6 6 18"></path>
        <path d="m6 6 12 12"></path>
      </svg>
    );

    const ArrowRight = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M5 12h14"></path>
        <path d="m12 5 7 7-7 7"></path>
      </svg>
    );

    const Camera = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
        <circle cx="12" cy="13" r="3"></circle>
      </svg>
    );

    const ChevronDown = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m6 9 6 6 6-6"></path>
      </svg>
    );

    // --- メインのサイト構成 ---
    function App() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [openFaqIndex, setOpenFaqIndex] = useState(null);

      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 50);
        };
        // passive: true でスクロールパフォーマンスを向上
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollToSection = (id) => {
        const element = document.getElementById(id);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
          setMobileMenuOpen(false);
        }
      };

      const toggleFaq = (index) => {
        setOpenFaqIndex(openFaqIndex === index ? null : index);
      };

      // メニューの項目
      const menuItems = ['Voice', 'Target', 'Concept', 'Works', 'Profile', 'Service', 'Price', 'FAQ'];

      // --- WHO IS THIS FOR（ターゲット層）のデータ ---
      const targets = [
        "自分の中にある大切な想いや美しさを、内から外へ打ち出した方アーティストの方",
        "これからの新しいステージへ進むために、しなやかで揺るぎない「自分の軸」を見つけたいチャレンジャーの方",
        "ただ消費される綺麗な写真ではなく、心から共鳴できる未来の仲間やお客様と出会うための「旗」掲げたい経営者の方"
      ];

      // --- 撮影実績（8枚）のデータ ---
      const works = [
        {
          title: "同行型ポートレート", desc: "Mountain Climbing", 
          img: "DSCF7657.jpg", 
          col: "md:col-span-8", aspect: "aspect-[2/3]"
        },
        {
          title: "ライフイベント ポートレート", desc: "K＆H", 
          img: "DSCF2900.jpg", 
          col: "md:col-span-4 md:mt-32", aspect: "aspect-[2/3]"
        },
        {
          title: "LIVE ポートレート", desc: "Atsushi -trio de guess", 
          img: "DSCF6786.jpg", 
          col: "md:col-span-5 md:-mt-16", aspect: "aspect-[2/3]"
        },
        {
          title: "ブランディング キービジュアル", desc: "SO", 
          img: "DSCF5055_Original 3.JPG", 
          col: "md:col-span-7 md:mt-24", aspect: "aspect-[2/3]"
        },
        {
          title: "ライフイベント ポートレート", desc: "BirthDay", 
          img: "DSCF6406.jpg", 
          col: "md:col-span-4 md:-mt-8", aspect: "aspect-[2/3]"
        },
        {
          title: "アーティスト ポートレート", desc: "JIRO", 
          img: "DSCF1806.jpg", 
          col: "md:col-span-8 md:mt-16", aspect: "aspect-[2/3]"
        },
        {
          title: "Band MV Behind the Scenes", desc: "WORLZ -Dancing in the Dark-", 
          img: "DSCF8790.jpg", 
          col: "md:col-span-6 md:mt-0", aspect: "aspect-[4/3]"
        },
        {
          title: "イベント Behind the Scenes", desc: "術 -jutsu-", 
          img: "DSCF7810.jpg", 
          col: "md:col-span-6 md:mt-28", aspect: "aspect-[4/3]"
        }
      ];

        // --- PRICE（詳細版）のデータ ---
      const plans = [
        {
          enTitle: "Process Portrait",
          jpTitle: "　プロセスポートレート",
          subtitle: "〜日常や活動に寄り添い、自然な姿を切り取る〜",
          price: "Ask",
          priceNote: "(要相談)",
          recommended: false,
          concept: "深傾聴であなたの想いや背景をお伺いし、実際の活動や日常の風景に同行しながら自然な表情や空気感を撮影します。　あなたの世界観を写した写真と、その日の熱量を定着させたアートプリントをご納品いたします。",
          deliverables: "事前リスニング ＋ 同行撮影 ＋ データ ＋ アートプリント"
        },
        {
          enTitle: "Ma",
          jpTitle: "　マ",
          subtitle: "〜間に現れる自身の熱量に触れる〜",
          price: "¥30,000",
          priceNote: "(税込)",
          recommended: false,
          concept: "あなたの内側にある熱量を抽出するセッションです。そのプロセスそのものを写します。",
          deliverables: "深傾聴セッション(30min) ＋ 撮影(2h) ＋ データ ＋ A4サイズのアートプリント"
        },
        {
          enTitle: "Personal Flag",
          jpTitle: "　パーソナル・フラッグ",
          subtitle: "〜自身の原風景を抽出し、日常に掲げる〜",
          price: "¥75,000",
          priceNote: "(税込)",
          recommended: false,
          concept: "対話を通じてあなた自身の「原風景」を抽出し、光の軌跡として写真という結晶に定着させます。日常の空間に飾ることで日々のノイズを鎮め、あなた自身のブレない軸となる「個人的な旗」を創り上げるプランです。",
          deliverables: "深傾聴セッション(1h) ＋ 撮影 ＋ データ ＋ アートプリント"
        }
      ];

      // FAQのデータ
      const faqs = [
        {
          q: "納期はどれくらいですか？",
          a: "丁寧に仕上げるため、基本的に撮影日から2週間頂いております。データ転送による即納のご相談も承ります。"
        },
        {
          q: "納品形式はどうなりますか？",
          a: "オンラインでのご納品とさせて頂いております。ギガファイル便 または Google Drive を使用して大切にお届けします。"
        },
        {
          q: "支払い方法は？",
          a: "現在は、現金と口座振込にてご対応させて頂いております。"
        },
        {
          q: "内容だけ聞いてみたいのですが…",
          a: "もちろん大歓迎です。ぜひInstagramのDMにて「少し気になっている」と気軽にお声がけください。"
        }
      ];

      return (
        <div className="min-h-screen bg-[#faf9f6] text-[#1a202c] font-sans selection:bg-[#c85a17]/20 selection:text-[#1a202c] antialiased">
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho+B1:wght@400;500;600;700&display=swap');
            
            .font-serif { font-family: 'Shippori Mincho B1', serif; }
            .font-sans { font-family: 'Noto Sans JP', sans-serif; }

            html { 
              scroll-behavior: smooth; 
              -webkit-overflow-scrolling: touch; 
            }
            
            * {
              -webkit-tap-highlight-color: transparent;
            }
            
            .bg-noise {
              position: fixed;
              inset: 0;
              z-index: 50;
              pointer-events: none;
              background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
              opacity: 0.02;
              transform: translateZ(0); 
              will-change: transform;
            }
          `}</style>

          {/* スマホ画面ではノイズを非表示にしてスクロールを軽くする */}
          <div className="bg-noise hidden md:block"></div>

          {/* Navigation */}
          <nav className={`fixed w-full z-40 transition-all duration-700 ${isScrolled ? 'bg-[#faf9f6]/95 backdrop-blur-sm py-4 border-b border-[#e2e8f0] shadow-sm' : 'bg-transparent py-8'}`}>
            <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
              <div 
                className="cursor-pointer group flex flex-col p-2 -ml-2"
                onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
              >
                <span className={`font-serif text-[22px] tracking-[0.2em] transition-colors duration-500 ${isScrolled ? 'text-[#1a202c]' : 'text-[#ffffff] md:text-[#1a202c]'}`}>Ema.</span>
              </div>

              <div className="hidden md:flex items-center gap-5 lg:gap-6">
                {menuItems.map((item) => (
                  <button 
                    key={item}
                    onClick={() => scrollToSection(item.toLowerCase())}
                    className={`font-sans text-[11px] tracking-[0.15em] uppercase transition-colors hover:text-[#c85a17] ${isScrolled ? 'text-[#718096]' : 'text-[#4a5568]'}`}
                  >
                    {item}
                  </button>
                ))}
                <a 
                  href="#contact" 
                  className={`font-sans text-[10px] tracking-[0.2em] px-6 py-2.5 uppercase transition-all duration-300 ml-2 ${isScrolled ? 'bg-[#1a202c] text-[#ffffff] hover:bg-[#c85a17]' : 'bg-[#1a202c] text-[#ffffff] hover:bg-[#c85a17]'}`}
                >
                  Contact
                </a>
              </div>

              <button 
                className="md:hidden z-50 mix-blend-difference text-white p-2 -mr-2"
                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                aria-label="メニューを開く"
              >
                {mobileMenuOpen ? <X size={28} strokeWidth={1} /> : <Menu size={28} strokeWidth={1} />}
              </button>
            </div>
          </nav>

          {/* Mobile Menu */}
          <div className={`fixed inset-0 bg-[#1a202c] text-white z-40 transition-opacity duration-500 ease-in-out flex flex-col items-center justify-center gap-8 ${mobileMenuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
            {menuItems.map((item) => (
              <button 
                key={item}
                onClick={() => scrollToSection(item.toLowerCase())}
                className="font-serif text-[24px] tracking-[0.2em] font-light hover:text-[#c85a17] transition-colors"
              >
                {item}
              </button>
            ))}
            <button 
              onClick={() => scrollToSection('contact')}
              className="mt-6 border border-white/30 px-10 py-4 font-sans text-[11px] tracking-[0.2em] uppercase hover:bg-white hover:text-[#1a202c] transition-colors"
            >
              Contact
            </button>
          </div>

        {/* Hero Section */}
          <section className="relative w-full h-screen px-6 md:px-12 pb-16 md:pb-24 pt-24 flex flex-col md:justify-end">
            <div className="absolute inset-0 z-0">
              <img 
                src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2000&auto=format&fit=crop&sat=-50" 
                alt="Hero Background" 
                className="w-full h-full object-cover object-left md:object-center grayscale-[0%]"
              />
              <div className="absolute inset-0 bg-gradient-to-t from-[#faf9f6] via-transparent to-black/20"></div>
              <div className="absolute inset-0 bg-[#faf9f6]/20 md:bg-transparent"></div>
            </div>
            
            <div className="relative z-10 w-full h-full md:h-auto max-w-7xl mx-auto flex flex-col md:flex-row md:items-end justify-between">
              
              <div className="flex-1 flex flex-col justify-center md:block md:flex-none">
                <h1 className="font-serif text-[14vw] sm:text-[90px] md:text-[6vw] leading-[1.5] tracking-[0.2em] text-[#FAFDFF] mb-0 md:mb-6">
                  <span className="whitespace-nowrap">あなたの</span><br className="md:hidden" />
                  <span className="whitespace-nowrap">原風景を、</span><br />
                  <span className="text-[#FAFDFF] italic font-light whitespace-nowrap">視覚化する。</span>
                </h1>
              </div>
              
              <div className="md:max-w-sm pb-8 md:pb-0">
                <p className="font-sans text-[12px] md:text-[14px] font-light leading-[2.4] text-[#2B2B2B] tracking-[0.15em] border-l border-[#c85a17] pl-4 md:pl-6 drop-shadow-md">
                  撮影は、記録ではなく。<br />
                  あなたが、変わっていく体験。
                </p>
              </div>
              
            </div>
          </section>

          {/* Voice Section */}
          <section id="voice" className="py-20 md:py-32 lg:py-40 bg-[#faf9f6] border-b border-[#e2e8f0]/50 relative overflow-hidden">
            <div className="max-w-4xl mx-auto px-6 md:px-12 text-center relative z-10">
              <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-6 md:mb-8 block">Voice</p>
              
              <div className="relative inline-block text-left mx-auto max-w-[280px] sm:max-w-md md:max-w-none">
                <span className="font-serif text-[60px] md:text-[80px] text-[#c85a17] leading-none opacity-10 absolute -top-8 -left-5 md:-top-6 md:-left-12 select-none">“</span>
                <p className="font-serif text-[15px] sm:text-[16px] md:text-[24px] text-[#1a202c] font-light leading-[2.4] md:leading-[2.0] tracking-widest relative z-10">
                  <span className="block md:hidden">
                    これからの撮影は、<br />
                    その場を整えることが<br />
                    すべてだと感じました。<br />
                    <br />
                    内外を整える、<br />
                    繊細で丁寧なカメラマンが、<br />
                    これからの時代には<br />
                    欠かせないだろう。
                  </span>
                  <span className="hidden md:block">
                    これからの撮影は、その場を整えることがすべてだと感じました。<br />
                    内外を整える、繊細で丁寧なカメラマンが、これからの時代には欠かせないだろう。
                  </span>
                </p>
              </div>

              <div className="mt-10 md:mt-12 flex flex-col items-center justify-center">
                <div className="w-12 h-[1px] bg-[#c85a17] mb-5 md:mb-6"></div>
                <p className="font-serif text-[16px] md:text-[18px] text-[#1a202c] tracking-widest mb-1">SO</p>
                <p className="font-sans text-[11px] text-[#718096] tracking-[0.15em]">アーティスト</p>
              </div>
            </div>
          </section>

          {/* Target Section */}
          <section id="target" className="py-20 md:py-32 lg:py-48 bg-[#ffffff]">
            <div className="max-w-4xl mx-auto px-6 md:px-12">
              <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-8 md:mb-10 block text-center">
                Who is this for
              </p>
              <h2 className="font-serif text-[22px] md:text-[36px] text-[#1a202c] tracking-[0.1em] mb-12 md:mb-20 text-center leading-[1.6]">
                こんな想いを、<br className="md:hidden"/>そっと抱えていませんか？
              </h2>
              
              <div className="space-y-5 md:space-y-8">
                {targets.map((text, i) => (
                  <div key={i} className="flex gap-4 md:gap-6 items-start bg-[#faf9f6] p-6 md:p-10 border border-[#e2e8f0]/50 hover:border-[#c85a17]/30 transition-colors duration-500">
                    <span className="font-serif text-[28px] md:text-[40px] text-[#c85a17] leading-none opacity-50 mt-[-4px] md:mt-0">“</span>
                    <p className="font-serif text-[14px] md:text-[16px] text-[#4a5568] leading-[2.2] tracking-widest pt-1 md:pt-2">
                      {text}
                    </p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Concept Section */}
          <section id="concept" className="py-20 md:py-32 lg:py-48 bg-[#faf9f6]">
            <div className="max-w-4xl mx-auto px-6 md:px-12 text-center">
              <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-8 md:mb-10 block">
                Concept
              </p>
              <h2 className="font-serif text-[20px] md:text-[32px] text-[#1a202c] tracking-[0.15em] leading-[1.8] mb-12 md:mb-16">
                想いを迎え入れ、<br className="md:hidden"/>未来へと繋ぐ「扉」として。
              </h2>
              
              <div className="space-y-8 md:space-y-10 relative">
                <div className="absolute -top-8 md:-top-12 left-1/2 -translate-x-1/2 w-[1px] h-6 md:h-8 bg-[#c85a17]/50"></div>
                
                <p className="font-serif text-[14px] md:text-[17px] font-light leading-[2.4] text-[#4a5568] tracking-widest text-left md:text-center">
                  私がお届けしたいのは、単なる綺麗な写真ではありません。<br className="hidden md:block"/>
                  Ema.は、あなたの内側にある言葉にならない熱量や、<br className="hidden md:block"/>
                  ありのままの魅力、多様な価値観をまるごと受け入れる「場」です。
                </p>
                <p className="font-serif text-[14px] md:text-[17px] font-light leading-[2.4] text-[#4a5568] tracking-widest text-left md:text-center">
                  深い対話を通じて、あなたの奥底にある「原風景」にそっと耳を傾け、<br className="hidden md:block"/>
                  それを社会や未来の仲間と繋ぐための「架け橋」を作ること。
                </p>
                <p className="font-serif text-[14px] md:text-[17px] font-light leading-[2.4] text-[#4a5568] tracking-widest text-left md:text-center">
                  一枚の写真が、あなたの新しい世界を開く最初の「扉」になる。<br className="hidden md:block"/>
                  そんなあたたかく、力強い体験をここから始めませんか。
                </p>
              </div>
            </div>
          </section>

          {/* Works Section */}
          <section id="works" className="py-20 md:py-32 lg:py-48 bg-[#ffffff]">
            <div className="max-w-7xl mx-auto px-6 md:px-12">
              <div className="flex justify-between items-end mb-16 md:mb-24">
                <div>
                  <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-4 block">Selected Works</p>
                  <h2 className="font-serif text-[32px] md:text-[40px] text-[#1a202c] tracking-[0.1em] leading-none">
                    撮影実績
                  </h2>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-12 gap-y-16 md:gap-x-8 md:gap-y-24">
                {works.map((work, index) => (
                  <div key={index} className={`${work.col} group cursor-pointer`}>
                    <div className={`overflow-hidden relative bg-[#f0f2f5] mb-6 ${work.aspect}`}>
                      <img 
                        src={work.img} 
                        alt={work.title} 
                        loading="lazy"
                        decoding="async"
                        className="w-full h-full object-cover transform group-hover:scale-[1.03] transition-transform duration-1000 ease-out grayscale-[10%]" 
                      />
                    </div>
                    <div className="flex justify-between items-start">
                      <div>
                        <h3 className="font-serif text-[20px] text-[#1a202c] tracking-[0.1em] mb-2 group-hover:text-[#c85a17] transition-colors">{work.title}</h3>
                        <p className="font-sans text-[11px] text-[#718096] tracking-[0.1em] uppercase">{work.desc}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              
              <div className="mt-20 md:mt-32 text-center">
                <button className="border-b border-[#1a202c] pb-1 font-sans text-[12px] tracking-[0.15em] text-[#1a202c] hover:text-[#c85a17] hover:border-[#c85a17] transition-colors uppercase">
                  2023-2025 Works
                </button>
              </div>
            </div>
          </section>

          {/* Profile Section */}
          <section id="profile" className="py-20 md:py-32 lg:py-48 bg-[#faf9f6]">
            <div className="max-w-6xl mx-auto px-6 md:px-12 flex flex-col md:flex-row gap-16 md:gap-24">
              <div className="w-full md:w-5/12 relative">
                <div className="absolute -top-4 -left-4 w-24 h-24 bg-[#c85a17]/10 rounded-tl-3xl"></div>
                <img 
                  src="DSCF8958.jpg" 
                  alt="YUTA" 
                  loading="lazy"
                  decoding="async"
                  className="relative z-10 w-full aspect-[3/4] object-cover grayscale-[20%]" 
                />
              </div>
              
              <div className="w-full md:w-7/12 flex flex-col justify-center">
                <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-6 block">Profile</p>
                <h2 className="font-serif text-[32px] md:text-[40px] text-[#1a202c] tracking-[0.1em] mb-8 leading-none">YUTA</h2>
                <p className="font-sans text-[12px] text-[#718096] tracking-[0.2em] uppercase mb-12">Boundary Spanner / Visualizer</p>
                
                <div className="space-y-6 max-w-lg">
                  <p className="font-serif text-[14px] md:text-[15px] font-light leading-[2.2] text-[#4a5568] tracking-widest">
                    祖父の事務所「エナヂー」でのあたたかな原体験を基に、人の内側に秘められた熱量や美しさを可視化する活動「Ema.」をスタートしました。
                  </p>
                  <p className="font-serif text-[14px] md:text-[15px] font-light leading-[2.2] text-[#4a5568] tracking-widest">
                    複雑な想いや言葉にならない感情に深く、優しく傾聴し、「間」という余白を通じて、社会と繋がるための美しい形へと翻訳していきます。
                  </p>
                  <p className="font-serif text-[14px] md:text-[15px] font-light leading-[2.2] text-[#4a5568] tracking-widest">
                    カメラを通して、単なる記録ではない「新しいあなたに出会う第一歩」となるビジュアルを創り出しています。
                  </p>
                </div>
              </div>
            </div>
          </section>

          {/* Service & Process Section */}
          <section id="service" className="py-20 md:py-32 lg:py-48 bg-[#ffffff] border-t border-[#e2e8f0]/50">
            <div className="max-w-7xl mx-auto px-6 md:px-12">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-24">
                
                <div>
                  <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-8 block">Service</p>
                  <h2 className="font-serif text-[28px] md:text-[32px] text-[#1a202c] tracking-[0.1em] mb-12 md:mb-16">ご提供する価値</h2>
                  
                  <div className="space-y-12 md:space-y-16">
                    <div className="border-t border-[#e2e8f0] pt-8 group hover:border-[#c85a17]/50 transition-colors">
                      <h3 className="font-serif text-[20px] text-[#1a202c] tracking-[0.1em] mb-3 group-hover:text-[#c85a17] transition-colors">現像セッション</h3>
                      <p className="font-sans text-[11px] text-[#c85a17] tracking-[0.15em] uppercase mb-6">Philosophy Visualization</p>
                      <p className="font-serif text-[14px] text-[#4a5568] leading-[2.2] tracking-wider mb-6">
                        対話を通して、あなたの根底にある熱量や魅力を引き出し、メインビジュアルとして形にします。あなたの奥にあるストーリーを写し出し、未来へと進むための道しるべとなる一枚を創り出します。
                      </p>
                    </div>
                    
                    <div className="border-t border-[#e2e8f0] pt-8 group hover:border-[#c85a17]/50 transition-colors">
                      <h3 className="font-serif text-[20px] text-[#1a202c] tracking-[0.1em] mb-3 group-hover:text-[#c85a17] transition-colors">境界連結プロジェクト</h3>
                      <p className="font-sans text-[11px] text-[#c85a17] tracking-[0.15em] uppercase mb-6">Boundary Spanning</p>
                      <p className="font-serif text-[14px] text-[#4a5568] leading-[2.2] tracking-wider mb-6">
                        ビジュアル制作にとどまらず、その写真を用いた社会へのアプローチまで伴走します。新しいパートナー探しや発信戦略など、あなたの想いを社会へとしなやかに繋げるサポートを行います。
                      </p>
                    </div>
                  </div>
                </div>

                <div>
                  <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-8 block">Process</p>
                  <h2 className="font-serif text-[28px] md:text-[32px] text-[#1a202c] tracking-[0.1em] mb-12 md:mb-16">共に歩むプロセス</h2>
                  
                  <div className="space-y-8 md:space-y-10">
                    {[
                      { step: "01", title: "Dialogue", desc: "深く寄り添う傾聴と、想いの紐解き" },
                      { step: "02", title: "Scouting", desc: "光や空間など、あなたに寄り添う視覚表現の設計" },
                      { step: "03", title: "Shooting", desc: "カメラを通じた、熱量と本来の美しさの現像" },
                      { step: "04", title: "Encounter", desc: "社会へと繋がる、あなただけの「旗印」との出会い" }
                    ].map((item, i) => (
                      <div key={i} className="flex gap-6 items-start group">
                        <span className="font-serif text-[18px] text-[#a0aec0] mt-1 group-hover:text-[#c85a17] transition-colors">{item.step}</span>
                        <div>
                          <h4 className="font-sans text-[14px] text-[#1a202c] font-bold tracking-[0.15em] uppercase mb-2">{item.title}</h4>
                          <p className="font-serif text-[14px] text-[#718096] tracking-widest">{item.desc}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            </div>
          </section>

          {/* Price Section */}
          <section id="price" className="py-20 md:py-32 lg:py-48 bg-[#faf9f6]">
            <div className="max-w-7xl mx-auto px-6 md:px-12">
              <div className="flex flex-col md:flex-row justify-between items-start gap-8 md:gap-16 mb-16 md:mb-24">
                <div className="w-full md:w-1/3">
                  <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-4 block">Price</p>
                  <h2 className="font-serif text-[28px] md:text-[36px] text-[#1a202c] tracking-[0.1em]">撮影プラン価格</h2>
                </div>
                
                <div className="w-full md:w-2/3">
                  <h3 className="font-serif text-[16px] md:text-[20px] font-light tracking-[0.15em] text-[#1a202c] mb-6 md:mb-8 leading-[1.8]">
                    消費されるデータではなく、<br className="hidden md:block"/>未来の仲間を引き寄せる「道しるべ」へ。
                  </h3>
                  <div className="space-y-6 font-sans text-[13px] md:text-[14px] text-[#4a5568] font-light leading-[2.4] tracking-[0.15em]">
                    <p>
                      Ema.の撮影プロジェクトは、スマートフォンの中でただ消費されていくデジタルデータを納品することを目的としていません。深い対話によって見つけたあなたの「原風景」と「熱量」を、光の軌跡として写真という結晶に定着させます。
                    </p>
                    <p>
                      それを額装アートとして、ご自宅やオフィスの壁など、日常の風景に飾っていただくこと。迷いが生じた時に本来の自分に立ち還り、そして未来の仲間を引き寄せるための「あなたのお守り」として機能させることが、このプロジェクトの願いです。
                    </p>
                  </div>
                </div>
              </div>

              <div className="border-t border-[#1a202c]">
                {plans.map((plan, index) => (
                  <div key={index} className="py-12 md:py-16 border-b border-[#e2e8f0] flex flex-col lg:flex-row justify-between items-start gap-8 md:gap-10">
                    <div className="w-full lg:w-3/4 pr-0 lg:pr-12">
                      <div className="flex flex-wrap items-center gap-3 mb-2">
                        <h3 className="font-serif text-[20px] md:text-[24px] tracking-[0.15em] text-[#1a202c]">{plan.enTitle}</h3>
                        {plan.recommended && (
                          <span className="font-sans text-[10px] bg-[#1a202c] text-white px-3 py-1 tracking-[0.2em] uppercase ml-2">Ema.推奨</span>
                        )}
                      </div>
                      <p className="font-sans text-[11px] text-[#718096] tracking-[0.15em] mb-6">{plan.jpTitle}</p>
                      
                      <p className="font-serif text-[13px] md:text-[14px] text-[#1a202c] leading-[2.4] tracking-[0.15em] font-medium mb-6 md:mb-8">
                        {plan.subtitle}
                      </p>
                      
                      <div className="space-y-6">
                        <div>
                          <span className="font-sans text-[10px] text-[#c85a17] tracking-[0.2em] uppercase block mb-2 font-bold">Concept</span>
                          <p className="font-sans text-[13px] text-[#4a5568] leading-[2.4] tracking-[0.15em] font-light">
                            {plan.concept}
                          </p>
                        </div>
                        {plan.deliverables && (
                          <div>
                            <span className="font-sans text-[10px] text-[#c85a17] tracking-[0.2em] uppercase block mb-2 font-bold">Deliverables</span>
                            <p className="font-sans text-[13px] text-[#4a5568] leading-[2.4] tracking-[0.15em] font-light">
                              {plan.deliverables}
                            </p>
                          </div>
                        )}
                      </div>
                    </div>
                    
                    <div className="w-full lg:w-1/4 text-left lg:text-right mt-2 md:mt-0">
                      <p className="font-serif text-[20px] md:text-[24px] tracking-wider text-[#1a202c]">
                        <span className="whitespace-nowrap">{plan.price}</span>
                        <span className="font-sans text-[12px] text-[#718096] block lg:inline lg:ml-2 mt-1 md:mt-0">{plan.priceNote}</span>
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* FAQ Section */}
          <section id="faq" className="py-20 md:py-32 lg:py-48 bg-[#f5f6f8]">
            <div className="max-w-3xl mx-auto px-6 md:px-12">
              <div className="text-center mb-12 md:mb-20">
                <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-4 block">FAQ</p>
                <h2 className="font-serif text-[28px] md:text-[36px] text-[#1a202c] tracking-[0.1em] mb-8">よくある質問</h2>
                <div className="w-8 h-[1px] bg-[#1a202c] mx-auto"></div>
              </div>

              <div className="border-t border-[#e2e8f0]">
                {faqs.map((faq, index) => {
                  const isOpen = openFaqIndex === index;
                  return (
                    <div key={index} className="border-b border-[#e2e8f0]">
                      <button 
                        className="w-full flex justify-between items-center py-6 md:py-8 text-left group"
                        onClick={() => toggleFaq(index)}
                      >
                        <h3 className="font-serif text-[15px] md:text-[18px] text-[#1a202c] tracking-widest group-hover:text-[#c85a17] transition-colors pr-4">
                          <span className="font-serif mr-3">Q.</span>{faq.q}
                        </h3>
                        <div className={`transform transition-transform duration-300 flex-shrink-0 ${isOpen ? 'rotate-180' : ''}`}>
                          <ChevronDown size={20} className="text-[#4a5568]" strokeWidth={1.5} />
                        </div>
                      </button>
                      
                      <div 
                        className={`overflow-hidden transition-all duration-300 ease-in-out ${isOpen ? 'max-h-40 opacity-100 mb-6 md:mb-8' : 'max-h-0 opacity-0'}`}
                      >
                        <p className="font-sans text-[13px] md:text-[14px] text-[#4a5568] leading-[2.0] tracking-wider pl-8">
                          {faq.a}
                        </p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {/* Contact Section */}
          <section id="contact" className="py-32 md:py-56 bg-[#1a202c] text-[#ffffff] text-center px-6 relative overflow-hidden">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#c85a17]/10 rounded-full blur-[100px] pointer-events-none"></div>

            <div className="relative z-10">
              <h2 className="font-serif text-[28px] md:text-[48px] tracking-[0.15em] mb-8 leading-[1.6]">
                あなたの内に秘めた想いを、<br/>
                そっと聞かせてください。
              </h2>
              
              <p className="font-sans text-[13px] md:text-[14px] font-light leading-[2.4] text-[#a0aec0] tracking-widest mb-12 md:mb-16">
                ↓ DMはこちらから ↓
              </p>
              
              <a 
                href="https://instagram.com" 
                target="_blank" 
                rel="noopener noreferrer"
                className="inline-flex items-center justify-center gap-3 border border-[#c85a17] text-[#c85a17] px-10 py-4 md:px-12 md:py-5 hover:bg-[#c85a17] hover:text-[#ffffff] transition-all duration-300 group rounded-sm"
              >
                <Instagram size={16} strokeWidth={1.5} />
                <span className="font-sans text-[12px] tracking-[0.2em] uppercase font-medium">Instagram DM</span>
              </a>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-[#1a202c] border-t border-white/10 py-10 md:py-12">
            <div className="max-w-7xl mx-auto px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-6">
              <span className="font-serif text-[20px] md:text-[24px] tracking-[0.3em] text-[#ffffff] leading-none">Ema.</span>
              <span className="text-[#718096] font-sans text-[10px] tracking-[0.2em] uppercase">
                © {new Date().getFullYear()} Ema. All rights reserved.
              </span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
