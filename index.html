<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ema. | Boundary Spanner</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンのコンポーネント ---
    const Instagram = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>
      </svg>
    );

    const Menu = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="4" x2="20" y1="12" y2="12"></line>
        <line x1="4" x2="20" y1="6" y2="6"></line>
        <line x1="4" x2="20" y1="18" y2="18"></line>
      </svg>
    );

    const X = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M18 6 6 18"></path>
        <path d="m6 6 12 12"></path>
      </svg>
    );

    const ArrowRight = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M5 12h14"></path>
        <path d="m12 5 7 7-7 7"></path>
      </svg>
    );

    const Camera = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
        <circle cx="12" cy="13" r="3"></circle>
      </svg>
    );

    const ChevronDown = ({ size = 24, strokeWidth = 2, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m6 9 6 6 6-6"></path>
      </svg>
    );

    // --- メインのサイト構成 ---
    function App() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [openFaqIndex, setOpenFaqIndex] = useState(null);

      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 50);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollToSection = (id) => {
        const element = document.getElementById(id);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
          setMobileMenuOpen(false);
        }
      };

      const toggleFaq = (index) => {
        setOpenFaqIndex(openFaqIndex === index ? null : index);
      };

      const menuItems = ['Concept', 'Works', 'Profile', 'Service', 'Price', 'FAQ'];

      // --- 撮影実績（8枚）のデータ ---
      const works = [
        {
          title: "同行型ポートレート", desc: "Mountain Climbing", 
          img: "DSCF7657.jpg", 
          col: "md:col-span-8", aspect: "aspect-[2/3]"
        },
        {
          title: "ライフイベント ポートレート", desc: "K＆H", 
          img: "DSCF2900.jpg", 
          col: "md:col-span-4 md:mt-32", aspect: "aspect-[2/3]"
        },
        {
          title: "LIVE ポートレート", desc: "Atsushi -trio de guess", 
          img: "DSCF6786.jpg", 
          col: "md:col-span-5 md:-mt-16", aspect: "aspect-[2/3]"
        },
        {
          title: "ブランディング キービジュアル", desc: "SO", 
          img: "DSCF5055_Original 3.JPG", 
          col: "md:col-span-7 md:mt-24", aspect: "aspect-[2/3]"
        },
        {
          title: "ライフイベント ポートレート", desc: "BirthDay", 
          img: "DSCF6406.jpg", 
          col: "md:col-span-4 md:-mt-8", aspect: "aspect-[2/3]"
        },
        {
          title: "アーティスト ポートレート", desc: "JIRO", 
          img: "DSCF1806.jpg", 
          col: "md:col-span-8 md:mt-16", aspect: "aspect-[2/3]"
        },
        {
          title: "Band MV Behind the Scenes", desc: "WORLZ -Dancing in the Dark-", 
          img: "DSCF8790.jpg", 
          col: "md:col-span-6 md:mt-0", aspect: "aspect-[4/3]"
        },
        {
          title: "イベント Behind the Scenes", desc: "術 -jutsu-", 
          img: "DSCF7810.jpg", 
          col: "md:col-span-6 md:mt-28", aspect: "aspect-[4/3]"
        }
      ];

      // --- PRICE（詳細版）のデータ ---
      const plans = [
        {
          enTitle: "Ma",
          jpTitle: "　マ",
          subtitle: "〜自身の熱量に触れる、最初の一歩〜",
          price: "¥30,000",
          priceNote: "(税込)",
          recommended: false,
          concept: "あなたの内側にある熱量の「欠片（フラグメント）」を抽出するショートセッションです。まずは自分の現在地を視覚化します。",
          deliverables: "深傾聴セッション(30min) ＋ 撮影(2h) ＋ A4サイズのアートプリント 1枚"
        },
        {
          enTitle: "Personal Flag ",
          jpTitle: "　パーソナル・フラッグ",
          subtitle: "〜自身の原風景を抽出し、日常に掲げる〜",
          price: "¥75,000",
          priceNote: "(税込)",
          recommended: false,
          concept: "対話を通じてあなた自身の「原風景」を抽出し、光の軌跡として写真という結晶に定着させます。日常の空間に飾ることで日々のノイズを鎮め、あなた自身のブレない軸となる「個人的な旗」を作り上げるベーシックプランです。",
          deliverables: "深傾聴セッション(1h) ＋ 撮影 "
        },
        {
          enTitle: "Visualization Session",
          jpTitle: "　現像セッション",
          subtitle: "〜空間をデザインし、あなたを導く人生のマスターピース〜",
          price: "¥110,000",
          priceNote: "(税込)",
          recommended: false,
          concept: "Ema.が提供する本命の現像セッションです。あなたの内なる熱量とカオスを抽出し、まるで油絵のような圧倒的な物質感を持つ大判アートとして昇華させます。未来の仲間を引き寄せる強力な「旗印」となります。",
          deliverables: "深傾聴セッション(2h) ＋ 撮影 ＋ A3〜A2サイズ相当の大判キャンバスプリント ＆ 額装（1点） ＋ 空間インストール"
        },

      ];

      // FAQのデータ
      const faqs = [
        {
          q: "納期はどれくらいですか？",
          a: "基本的に撮影日から2週間頂いております。データ転送により即納も可能です"
        },
        {
          q: "納品形式はどうなりますか？",
          a: "オンラインでのご納品とさせて頂いております。ギガファイル便 or Google Driveを使用しています。"
        },
        {
          q: "支払い方法は？",
          a: "現在は、キャッシュと口座振込にてご対応させて頂いております。"
        },
        {
          q: "内容だけ聞いてみたい",
          a: "ぜひDMにて「気になる」とメッセージください。"
        }
      ];

      return (
        <div className="min-h-screen bg-[#faf9f6] text-[#1a202c] font-sans selection:bg-[#c85a17]/20 selection:text-[#1a202c]">
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho+B1:wght@400;500;600;700&display=swap');
            
            .font-serif { font-family: 'Shippori Mincho B1', serif; }
            .font-sans { font-family: 'Noto Sans JP', sans-serif; }

            html { scroll-behavior: smooth; }
            
            .bg-noise {
              position: fixed;
              inset: 0;
              z-index: 50;
              pointer-events: none;
              background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
              opacity: 0.02;
            }
          `}</style>

          <div className="bg-noise"></div>

          {/* Navigation */}
          <nav className={`fixed w-full z-40 transition-all duration-700 ${isScrolled ? 'bg-[#faf9f6]/95 backdrop-blur-sm py-4 border-b border-[#e2e8f0]' : 'bg-transparent py-8'}`}>
            <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
              <div 
                className="cursor-pointer group flex flex-col"
                onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
              >
                <span className={`font-serif text-[22px] tracking-[0.2em] transition-colors duration-500 ${isScrolled ? 'text-[#1a202c]' : 'text-[#ffffff] md:text-[#1a202c]'}`}>Ema.</span>
              </div>

              <div className="hidden md:flex items-center gap-8 lg:gap-10">
                {menuItems.map((item) => (
                  <button 
                    key={item}
                    onClick={() => scrollToSection(item.toLowerCase())}
                    className={`font-sans text-[11px] tracking-[0.15em] uppercase transition-colors hover:text-[#c85a17] ${isScrolled ? 'text-[#718096]' : 'text-[#4a5568]'}`}
                  >
                    {item}
                  </button>
                ))}
                <a 
                  href="#contact" 
                  className={`font-sans text-[10px] tracking-[0.2em] px-6 py-2.5 uppercase transition-all duration-300 ml-2 ${isScrolled ? 'bg-[#1a202c] text-[#ffffff] hover:bg-[#c85a17]' : 'bg-[#1a202c] text-[#ffffff] hover:bg-[#c85a17]'}`}
                >
                  Contact
                </a>
              </div>

              <button 
                className="md:hidden z-50 mix-blend-difference text-white"
                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
              >
                {mobileMenuOpen ? <X size={28} strokeWidth={1} /> : <Menu size={28} strokeWidth={1} />}
              </button>
            </div>
          </nav>

          {/* Mobile Menu */}
          <div className={`fixed inset-0 bg-[#1a202c] text-white z-40 transition-opacity duration-500 ease-in-out flex flex-col items-center justify-center gap-8 ${mobileMenuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
            {menuItems.map((item) => (
              <button 
                key={item}
                onClick={() => scrollToSection(item.toLowerCase())}
                className="font-serif text-[24px] tracking-[0.2em] font-light hover:text-[#c85a17] transition-colors"
              >
                {item}
              </button>
            ))}
            <button 
              onClick={() => scrollToSection('contact')}
              className="mt-6 border border-white/30 px-10 py-4 font-sans text-[11px] tracking-[0.2em] uppercase hover:bg-white hover:text-[#1a202c] transition-colors"
            >
              Contact
            </button>
          </div>

          {/* Hero Section */}
          <section className="relative w-full h-screen px-6 md:px-12 pb-16 md:pb-24 pt-24 flex flex-col md:justify-end">
            <div className="absolute inset-0 z-0">
              <img 
                src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2000&auto=format&fit=crop&sat=-50" 
                alt="Hero Background" 
                className="w-full h-full object-cover object-left md:object-center grayscale-[0%]"
              />
              <div className="absolute inset-0 bg-gradient-to-t from-[#faf9f6] via-transparent to-black/20"></div>
              <div className="absolute inset-0 bg-[#faf9f6]/20 md:bg-transparent"></div>
            </div>
            
            <div className="relative z-10 w-full h-full md:h-auto max-w-7xl mx-auto flex flex-col md:flex-row md:items-end justify-between">
              
              <div className="flex-1 flex flex-col justify-center md:block md:flex-none">
                <h1 className="font-serif text-[14vw] sm:text-[90px] md:text-[6vw] leading-[1.5] tracking-[0.2em] text-[#FAFDFF] mb-0 md:mb-6">
                  <span className="whitespace-nowrap">あなたの</span><br className="md:hidden" />
                  <span className="whitespace-nowrap">原風景を、</span><br />
                  <span className="text-[#FAFDFF] italic font-light whitespace-nowrap">視覚化する。</span>
                </h1>
              </div>
              
              <div className="md:max-w-sm pb-8 md:pb-0">
                <p className="font-sans text-[12px] md:text-[13px] font-light leading-[2.4] text-[#4a5568] tracking-[0.15em] border-l border-[#c85a17] pl-4 md:pl-6">
                  自分の世界観は確かにある。<br />
                  でも、それがまだ誰にも伝わっていない気がする。<br />
                  そんなあなたの「見えない熱量」を、一枚の写真に定着させます。

                </p>
              </div>
              
            </div>
          </section>

          {/* Concept Section */}
          <section id="concept" className="py-32 md:py-48 bg-[#faf9f6]">
            <div className="max-w-4xl mx-auto px-6 md:px-12 text-center">
              <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-10 block">
                Concept
              </p>
              <h2 className="font-serif text-[22px] md:text-[36px] text-[#1a202c] tracking-[0.15em] leading-[1.8] mb-16">
                「境界連結者」としての役割
              </h2>
              
              <div className="space-y-8 relative">
                <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-[1px] h-8 bg-[#c85a17]/50"></div>
                
                <p className="font-serif text-[15px] md:text-[17px] font-light leading-[2.4] text-[#4a5568] tracking-widest">
                  私は単なるカメラマンではありません。<br className="hidden md:block"/><br />
                  内側の「あなたの原風景」と、<br />外側の「社会実装」を繋ぐ翻訳者です。
                </p>
                <p className="font-serif text-[15px] md:text-[17px] font-light leading-[2.4] text-[#4a5568] tracking-widest">
                  深傾聴によりあなたの哲学を抽出し、言語化以前の熱量を一枚の写真に結晶化させる。<br className="hidden md:block"/>
                  それは未来の仲間を引き寄せる、強力な「旗」となります。
                </p>
              </div>
            </div>
          </section>

          {/* Works Section */}
          <section id="works" className="py-32 md:py-48 bg-[#ffffff]">
            <div className="max-w-7xl mx-auto px-6 md:px-12">
              <div className="flex justify-between items-end mb-24">
                <div>
                  <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-4 block">Selected Works</p>
                  <h2 className="font-serif text-[32px] md:text-[40px] text-[#1a202c] tracking-[0.1em] leading-none">
                    撮影実績
                  </h2>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-12 gap-y-16 md:gap-x-8 md:gap-y-24">
                {works.map((work, index) => (
                  <div key={index} className={`${work.col} group cursor-pointer`}>
                    <div className={`overflow-hidden relative bg-[#f0f2f5] mb-6 ${work.aspect}`}>
                      <img 
                        src={work.img} 
                        alt={work.title} 
                        className="w-full h-full object-cover transform group-hover:scale-[1.03] transition-transform duration-1000 ease-out grayscale-[10%]" 
                      />
                    </div>
                    <div className="flex justify-between items-start">
                      <div>
                        <h3 className="font-serif text-[20px] text-[#1a202c] tracking-[0.1em] mb-2 group-hover:text-[#c85a17] transition-colors">{work.title}</h3>
                        <p className="font-sans text-[11px] text-[#718096] tracking-[0.1em] uppercase">{work.desc}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              
              <div className="mt-32 text-center">
                <button className="border-b border-[#1a202c] pb-1 font-sans text-[12px] tracking-[0.15em] text-[#1a202c] hover:text-[#c85a17] hover:border-[#c85a17] transition-colors uppercase">
                  2023-2025 Works
                </button>
              </div>
            </div>
          </section>

          {/* Profile Section */}
          <section id="profile" className="py-32 md:py-48 bg-[#faf9f6]">
            <div className="max-w-6xl mx-auto px-6 md:px-12 flex flex-col md:flex-row gap-16 md:gap-24">
              <div className="w-full md:w-5/12 relative">
                <div className="absolute -top-4 -left-4 w-24 h-24 bg-[#c85a17]/10 rounded-tl-3xl"></div>
                <img src="DSCF8958.jpg" alt="YUTA" className="relative z-10 w-full aspect-[3/4] object-cover grayscale-[20%]" />
              </div>
              
              <div className="w-full md:w-7/12 flex flex-col justify-center">
                <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-6 block">Profile</p>
                <h2 className="font-serif text-[32px] md:text-[40px] text-[#1a202c] tracking-[0.1em] mb-8 leading-none">YUTA</h2>
                <p className="font-sans text-[12px] text-[#718096] tracking-[0.2em] uppercase mb-12">Boundary Spanner / Visualizer</p>
                
                <div className="space-y-6 max-w-lg">
                  <p className="font-serif text-[14px] md:text-[15px] font-light leading-[2.2] text-[#4a5568] tracking-widest">
                    幼少期に得た祖父の事務所「エナヂー」での原体験を基に、人の内側にある熱量を可視化する活動「Ema.」を2023年から開始。
                  </p>
                  <p className="font-serif text-[14px] md:text-[15px] font-light leading-[2.2] text-[#4a5568] tracking-widest">
                    複雑な想いや哲学を深く傾聴し、「間」という余白を通じて、社会と繋がるための美しい構造へと翻訳する。
                  </p>
                  <p className="font-serif text-[14px] md:text-[15px] font-light leading-[2.2] text-[#4a5568] tracking-widest">
                    カメラを出力装置として用い、単なる記録ではない「社会実装のトリガー」となるビジュアルを創出している。
                  </p>
                </div>
              </div>
            </div>
          </section>

          {/* Service & Process Section */}
          <section id="service" className="py-32 md:py-48 bg-[#ffffff] border-t border-[#e2e8f0]/50">
            <div className="max-w-7xl mx-auto px-6 md:px-12">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-24">
                
                <div>
                  <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-8 block">Service</p>
                  <h2 className="font-serif text-[28px] md:text-[32px] text-[#1a202c] tracking-[0.1em] mb-16">ご提供する価値</h2>
                  
                  <div className="space-y-16">
                    <div className="border-t border-[#e2e8f0] pt-8 group hover:border-[#c85a17]/50 transition-colors">
                      <h3 className="font-serif text-[20px] text-[#1a202c] tracking-[0.1em] mb-3 group-hover:text-[#c85a17] transition-colors">現像セッション</h3>
                      <p className="font-sans text-[11px] text-[#c85a17] tracking-[0.15em] uppercase mb-6">Philosophy Visualization</p>
                      <p className="font-serif text-[14px] text-[#4a5568] leading-[2.2] tracking-wider mb-6">
                        対話を通してクライアントの根底にある熱量を抽出し、メインビジュアルとして結晶化させます。キービジュアルやその奥にあるナラティブポートレート、事業の旗印として機能する一枚を創り出します。
                      </p>
                    </div>
                    
                    <div className="border-t border-[#e2e8f0] pt-8 group hover:border-[#c85a17]/50 transition-colors">
                      <h3 className="font-serif text-[20px] text-[#1a202c] tracking-[0.1em] mb-3 group-hover:text-[#c85a17] transition-colors">境界連結プロジェクト</h3>
                      <p className="font-sans text-[11px] text-[#c85a17] tracking-[0.15em] uppercase mb-6">Boundary Spanning</p>
                      <p className="font-serif text-[14px] text-[#4a5568] leading-[2.2] tracking-wider mb-6">
                        ビジュアル制作にとどまらず、写真を用いた「社会実装」のプロセスまで伴走。ブランド構築、発信戦略など、哲学を社会と繋ぐための継続的なサポートを行います。
                      </p>
                    </div>
                  </div>
                </div>

                <div>
                  <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-8 block">Process</p>
                  <h2 className="font-serif text-[28px] md:text-[32px] text-[#1a202c] tracking-[0.1em] mb-16">共に歩むプロセス</h2>
                  
                  <div className="space-y-10">
                    {[
                      { step: "01", title: "Dialogue", desc: "深傾聴と哲学の抽出" },
                      { step: "02", title: "Scouting", desc: "空間・光・構図など視覚言語の設計" },
                      { step: "03", title: "Shooting", desc: "カメラを出力装置とした現像としての撮影" },
                      { step: "04", title: "Encounter", desc: "社会実装に向けた旗印の完成" }
                    ].map((item, i) => (
                      <div key={i} className="flex gap-6 items-start group">
                        <span className="font-serif text-[18px] text-[#a0aec0] mt-1 group-hover:text-[#c85a17] transition-colors">{item.step}</span>
                        <div>
                          <h4 className="font-sans text-[14px] text-[#1a202c] font-bold tracking-[0.15em] uppercase mb-2">{item.title}</h4>
                          <p className="font-serif text-[14px] text-[#718096] tracking-widest">{item.desc}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            </div>
          </section>

          {/* Price Section - 旗（Flag）コンセプト（詳細版） */}
          <section id="price" className="py-32 md:py-48 bg-[#faf9f6]">
            <div className="max-w-7xl mx-auto px-6 md:px-12">
              {/* リード文エリア */}
              <div className="flex flex-col md:flex-row justify-between items-start gap-12 md:gap-16 mb-24">
                <div className="w-full md:w-1/3">
                  <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-4 block">Price</p>
                  <h2 className="font-serif text-[28px] md:text-[36px] text-[#1a202c] tracking-[0.1em] mb-8">撮影プラン価格</h2>
                </div>
                
                <div className="w-full md:w-2/3">
                  <h3 className="font-serif text-[16px] md:text-[20px] font-light tracking-[0.15em] text-[#1a202c] mb-8 leading-[1.8]">
                    消費されるデータから、未来の仲間を引き寄せる<br className="hidden md:block"/>「旗」へ。
                  </h3>
                  <div className="space-y-6 font-sans text-[13px] md:text-[14px] text-[#4a5568] font-light leading-[2.4] tracking-[0.15em]">
                    <p>
                      Ema.の現像セッションは、スマホの中で消費されるデジタルデータを納品することを目的としていません。深傾聴によって抽出したあなたの「原風景」と「熱量」を、光の軌跡として写真という結晶に定着させます。
                    </p>
                    <p>
                      それを額装アートとしてご自宅やオフィスの壁（生活動線）に飾っていただくこと。迷いが生じた時に本来の自分（Center）に立ち返り、そして未来の仲間を引き寄せるための「あなたの旗印」として機能させることが、このプロジェクトの最終目的です。
                    </p>
                  </div>
                </div>
              </div>

              {/* プラン一覧 */}
              <div className="border-t border-[#1a202c]">
                {plans.map((plan, index) => (
                  <div key={index} className="py-16 border-b border-[#e2e8f0] flex flex-col lg:flex-row justify-between items-start gap-10">
                    <div className="w-full lg:w-3/4 pr-0 lg:pr-12">
                      <div className="flex flex-wrap items-center gap-3 mb-2">
                        <span className="font-serif text-[13px] text-[#718096] font-light tracking-widest">{plan.grade}</span>
                        <h3 className="font-serif text-[20px] md:text-[24px] tracking-[0.15em] text-[#1a202c]">{plan.enTitle}</h3>
                        {plan.recommended && (
                          <span className="font-sans text-[10px] bg-[#1a202c] text-white px-3 py-1 tracking-[0.2em] uppercase ml-2">Ema.推奨</span>
                        )}
                      </div>
                      <p className="font-sans text-[11px] text-[#718096] tracking-[0.15em] mb-6">{plan.jpTitle}</p>
                      
                      <p className="font-serif text-[13px] md:text-[14px] text-[#1a202c] leading-[2.4] tracking-[0.15em] font-medium mb-8">
                        {plan.subtitle}
                      </p>
                      
                      <div className="space-y-6">
                        <div>
                          <span className="font-sans text-[10px] text-[#c85a17] tracking-[0.2em] uppercase block mb-2 font-bold">Concept</span>
                          <p className="font-sans text-[13px] text-[#4a5568] leading-[2.4] tracking-[0.15em] font-light">
                            {plan.concept}
                          </p>
                        </div>
                        {plan.deliverables && (
                          <div>
                            <span className="font-sans text-[10px] text-[#c85a17] tracking-[0.2em] uppercase block mb-2 font-bold">Deliverables</span>
                            <p className="font-sans text-[13px] text-[#4a5568] leading-[2.4] tracking-[0.15em] font-light">
                              {plan.deliverables}
                            </p>
                          </div>
                        )}
                      </div>
                    </div>
                    
                    <div className="w-full lg:w-1/4 text-left lg:text-right mt-4 lg:mt-0">
                      <p className="font-serif text-[20px] md:text-[24px] tracking-wider text-[#1a202c]">
                        <span className="whitespace-nowrap">{plan.price}</span>
                        <span className="font-sans text-[12px] text-[#718096] block lg:inline lg:ml-2 mt-2 lg:mt-0">{plan.priceNote}</span>
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* FAQ Section */}
          <section id="faq" className="py-32 md:py-48 bg-[#f5f6f8]">
            <div className="max-w-3xl mx-auto px-6 md:px-12">
              <div className="text-center mb-20">
                <p className="font-sans text-[10px] tracking-[0.3em] text-[#c85a17] uppercase font-bold mb-4 block">FAQ</p>
                <h2 className="font-serif text-[28px] md:text-[36px] text-[#1a202c] tracking-[0.1em] mb-8">よくある質問</h2>
                <div className="w-8 h-[1px] bg-[#1a202c] mx-auto"></div>
              </div>

              <div className="border-t border-[#e2e8f0]">
                {faqs.map((faq, index) => {
                  const isOpen = openFaqIndex === index;
                  return (
                    <div key={index} className="border-b border-[#e2e8f0]">
                      <button 
                        className="w-full flex justify-between items-center py-8 text-left group"
                        onClick={() => toggleFaq(index)}
                      >
                        <h3 className="font-serif text-[16px] md:text-[18px] text-[#1a202c] tracking-widest group-hover:text-[#c85a17] transition-colors">
                          <span className="font-serif mr-3">Q.</span>{faq.q}
                        </h3>
                        <div className={`transform transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}>
                          <ChevronDown size={20} className="text-[#4a5568]" strokeWidth={1.5} />
                        </div>
                      </button>
                      
                      <div 
                        className={`overflow-hidden transition-all duration-300 ease-in-out ${isOpen ? 'max-h-40 opacity-100 mb-8' : 'max-h-0 opacity-0'}`}
                      >
                        <p className="font-sans text-[13px] md:text-[14px] text-[#4a5568] leading-[2.0] tracking-wider pl-8">
                          {faq.a}
                        </p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {/* Contact Section */}
          <section id="contact" className="py-40 md:py-56 bg-[#1a202c] text-[#ffffff] text-center px-6 relative overflow-hidden">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#c85a17]/10 rounded-full blur-[100px] pointer-events-none"></div>

            <div className="relative z-10">
              <h2 className="font-serif text-[32px] md:text-[48px] tracking-[0.15em] mb-8 leading-[1.6]">
                あなたの原風景を、<br/>
                聴かせてください。
              </h2>
              
              <p className="font-sans text-[13px] md:text-[14px] font-light leading-[2.4] text-[#a0aec0] tracking-widest mb-16">
                ↓DMはこちらから↓
              </p>
              
              <a 
                href="https://instagram.com" 
                target="_blank" 
                rel="noopener noreferrer"
                className="inline-flex items-center justify-center gap-3 border border-[#c85a17] text-[#c85a17] px-12 py-5 hover:bg-[#c85a17] hover:text-[#ffffff] transition-all duration-300 group rounded-sm"
              >
                <Instagram size={16} strokeWidth={1.5} />
                <span className="font-sans text-[12px] tracking-[0.2em] uppercase font-medium">Instagram DM</span>
              </a>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-[#1a202c] border-t border-white/10 py-12">
            <div className="max-w-7xl mx-auto px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-6">
              <span className="font-serif text-[24px] tracking-[0.3em] text-[#ffffff] leading-none">Ema.</span>
              <span className="text-[#718096] font-sans text-[10px] tracking-[0.2em] uppercase">
                © {new Date().getFullYear()} Ema. All rights reserved.
              </span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
